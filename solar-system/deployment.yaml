apiVersion: apps/v1
kind: Deployment
metadata:
  name: solar-system-deployment
  namespace: solar-system  # Added
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solar-system
  template:
    metadata:
      labels:
        app: solar-system
    spec:
      containers:
      - name: solar-system-container
        image: siddharth67/solar-system:v6
        imagePullPolicy: Always
        ports:
        - containerPort: 80
